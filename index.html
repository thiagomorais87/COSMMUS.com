<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COSMMUS Business | Criadores do Futuro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                dark: '#03010a', // Darker, cleaner black
                navy: '#0a041f', // Subtle nuance
                surface: '#120b24', // Very subtle card bg
                purple: '#8b00ff',
                pink: '#d900ff',
                cyan: '#00ffff',
              }
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              display: ['Inter', 'sans-serif'], // Could be Avenir if available locally
            },
            letterSpacing: {
              tighter: '-0.05em',
              tight: '-0.025em',
              widest: '0.25em',
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: transparent;
        color: #f3f4f6;
        overflow-x: hidden;
      }
      .glass-card {
        background: rgba(10, 5, 20, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }
      .gradient-text {
        background: linear-gradient(to right, #d900ff, #00ffff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-size: 200% auto;
        animation: shine 5s linear infinite;
      }
      .gradient-bg {
        background: linear-gradient(90deg, #8b00ff 0%, #d900ff 100%);
      }
      
      @keyframes shine {
        to {
          background-position: 200% center;
        }
      }

      ::selection {
        background: #d900ff;
        color: white;
      }
    </style>

}
</script>
